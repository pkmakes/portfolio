  <!-- Wird per JS aus der jeweiligen projekt.txt befüllt -->

      <a href="mailto:philippkautz@gmail.com">E-MAIL ↗</a>

  </footer>

</div>

<script src="common.js"></script>
<script>
/* =============================================================
   PROJEKT-DETAILSEITE
   -------------------------------------------------------------
   Wird aufgerufen als projekt.html?p=Projekt_1 (Ordnername).
   Lädt die passende projekt.txt + alle Bilder aus dem Ordner
   und zeigt die volle Fallstudie inkl. aller Bilder.
   ============================================================= */

const detailEl = document.getElementById('detail');

function showNotFound(){
  detailEl.innerHTML = '<div class="notice">Dieses Projekt konnte nicht geladen werden.<br><br>Entweder stimmt der Ordnername in der Adresse nicht, oder die Seite wurde per <b>Doppelklick</b> (file://) geöffnet – der Browser darf dann keine Ordner-Dateien lesen.<br><br>Öffne die Seite über <b>GitHub Pages</b> oder einen kleinen lokalen Server im Ordner <code>site/</code>:<br><br><code>python -m http.server</code><br><br>und dann <code>http://localhost:8000</code> aufrufen.</div>';
}

// Baut das Karussell-HTML: 1. Bild sichtbar, restliche Bilder verdeckt.
// Pfeile/Punkte erscheinen nur, wenn es mehr als ein Bild gibt.
function buildCarousel(p){
  if(!(p.images && p.images.length)) return "";
  const slides = p.images.map((src, i) =>
    `<img class="cslide${i === 0 ? ' active' : ''}" src="${esc(src)}" alt="${esc(p.title)} – Bild ${i+1} von ${p.images.length}" loading="${i === 0 ? 'eager' : 'lazy'}">`
  ).join("");
  if(p.images.length === 1){
    return `<div class="carousel"><div class="cslides">${slides}</div></div>`;
  }
  const dots = p.images.map((_, i) => `<button class="cdot${i === 0 ? ' active' : ''}" type="button" data-i="${i}" aria-label="Bild ${i+1}"></button>`).join("");
  return `
    <div class="carousel">
      <div class="cslides">${slides}</div>
      <button class="cnav cprev" type="button" aria-label="Vorheriges Bild">‹</button>
      <button class="cnav cnext" type="button" aria-label="Nächstes Bild">›</button>
      <span class="ccount">1 / ${p.images.length}</span>
      <div class="cdots">${dots}</div>
    </div>`;
}

// Aktiviert Klick-Navigation, Punkte und Pfeiltasten für ein gerendertes Karussell.
function initCarousel(){
  const carousel = detailEl.querySelector('.carousel');
  if(!carousel) return;
  const slides = Array.from(carousel.querySelectorAll('.cslide'));
  const dots = Array.from(carousel.querySelectorAll('.cdot'));
  const countEl = carousel.querySelector('.ccount');
  let idx = 0;

  function show(i){
    idx = (i + slides.length) % slides.length;
    slides.forEach((s, j) => s.classList.toggle('active', j === idx));
    dots.forEach((d, j) => d.classList.toggle('active', j === idx));
    if(countEl) countEl.textContent = (idx + 1) + ' / ' + slides.length;
  }

  carousel.querySelector('.cprev')?.addEventListener('click', () => show(idx - 1));
  carousel.querySelector('.cnext')?.addEventListener('click', () => show(idx + 1));
  dots.forEach(d => d.addEventListener('click', () => show(Number(d.dataset.i))));

  if(slides.length > 1){
    carousel.tabIndex = 0;
    carousel.addEventListener('keydown', e => {
      if(e.key === 'ArrowLeft'){ show(idx - 1); }
      if(e.key === 'ArrowRight'){ show(idx + 1); }
    });
  }
}

function renderDetail(p){
  document.title = p.title + ' – Philipp Kautz';
  const descMeta = document.getElementById('pagedesc');
  if(descMeta) descMeta.setAttribute('content', (p.desc || p.subtitle || p.title));

  const tags = (p.tags||[]).map(t => `<span class="tag">${esc(t)}</span>`).join("");
  const cta = p.link ? `<a class="cta" href="${esc(p.link)}" target="_blank" rel="noopener">${esc(p.linkText||"Ansehen")} →</a>` : "";
  const carousel = buildCarousel(p);

  detailEl.innerHTML = `
    <div class="detail row-b">
      <div class="dkicker">${esc(p.category)}${p.year ? ' · ' + esc(p.year) : ''}</div>
      <h1>${esc(p.title)}</h1>
      <div class="sub">${esc(p.subtitle||"")}</div>
      <div class="tags">${tags}</div>
      <p class="desc">${esc(p.desc||"")}</p>
      ${cta}
    </div>
    ${carousel}`;

  initCarousel();
}

async function load(){
  const params = new URLSearchParams(location.search);
  const folder = params.get('p');
  if(!folder){ showNotFound(); return; }
  try{
    const txt = await fetch("projekte/" + folder + "/projekt.txt").then(r => { if(!r.ok) throw 0; return r.text(); });
    const p = parseProjekt(txt, folder);
    if(!p.title) throw 0;
    renderDetail(p);
  }catch(e){
    showNotFound();
  }
}

load();
</script>
</body>
</html>
